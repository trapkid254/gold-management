<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURUM GOLD | Premium Gold Trading Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <span class="gold-text">AURUM</span> GOLD
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="#home" class="active">Home</a>
                <a href="#products">Products</a>
                <a href="#market">Market</a>
                <a href="#about">About</a>
            </div>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">🌓</button>
                <button class="btn-primary" id="clientLoginBtn">Client Portal</button>
            </div>
            <div class="mobile-menu-btn" id="mobileMenuBtn">☰</div>
        </div>
    </nav>

    <!-- Live Gold Ticker -->
    <div class="ticker-wrapper">
        <div class="ticker-label">LIVE GOLD</div>
        <div class="ticker-price" id="liveGoldPrice">$1,945.30</div>
        <div class="ticker-change" id="goldChange">+0.8%</div>
        <div class="ticker-updated">updating...</div>
    </div>

    <!-- Hero Section -->
    <section class="hero" id="home">
        <div class="hero-content glass-card">
            <h1>Trade Gold <span class="gold-text">Like a Pro</span></h1>
            <p>Real-time pricing · Secure storage · Instant settlement</p>
            <div class="hero-buttons">
                <button class="btn-primary" id="heroClientBtn">Client Access</button>
                <button class="btn-secondary" id="marketBtn">View Market</button>
            </div>
        </div>
    </section>

    <!-- Products Section -->
    <section class="products" id="products">
        <h2 class="section-title">Available <span class="gold-text">Gold Products</span></h2>
        <div class="products-grid" id="productsGrid">
            <!-- Products will be loaded dynamically -->
        </div>
    </section>

    <!-- Market Stats -->
    <section class="market-stats" id="market">
        <div class="stats-grid">
            <div class="stat-card glass-card">
                <div class="stat-label">Spot Gold</div>
                <div class="stat-value" id="spotPrice">$1,945.30</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-label">24h Volume</div>
                <div class="stat-value">2.4M oz</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-label">Market Cap</div>
                <div class="stat-value">$12.8T</div>
            </div>
            <div class="stat-card glass-card">
                <div class="stat-label">Inventory</div>
                <div class="stat-value" id="totalInventory">0 oz</div>
            </div>
        </div>
    </section>

    <!-- Hidden Admin Link -->
    <div style="display: none;"><a href="admin-login.html">Admin</a></div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/trading.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
