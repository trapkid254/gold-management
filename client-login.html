<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Login - AURUM GOLD</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card glass-card">
            <div class="login-header">
                <h2>Client <span class="gold-text">Portal</span></h2>
                <p>Access your gold trading dashboard</p>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            
            <form id="clientLoginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="client@aurum.com" value="client@aurum.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" value="client123" required>
                </div>
                
                <div class="demo-credentials">
                    <p>Demo: client@aurum.com / client123</p>
                    <p><a href="init-storage.html" style="color: #fbbf24; font-size: 12px;">Initialize Storage if first time</a></p>
                </div>
                
                <button type="submit" class="btn-primary btn-block">Login to Dashboard</button>
            </form>
            
            <div class="login-footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
